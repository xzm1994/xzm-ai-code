server:
  port: 8080
  servlet:
    session:
      cookie:
        max-age: 2592000

spring:
  session:
    timeout: 2592000
  application:
    name: xzm-ai-code
  profiles:
    active: local
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aicode
    username: root
    password: root
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志
logging:
  level:
    com.xzm.aicode.mapper: debug

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.xzm.aicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
